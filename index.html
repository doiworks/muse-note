<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ジミニー占い / jiminy-uranai</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">jiminy-uranai</p>
        <h1>ジミニー占い</h1>
        <p class="lead">大アルカナ22枚で、今日の流れや選択のヒントを読み解きます。</p>
      </header>

      <nav class="reading-menu" aria-label="占い方式を選択">
        <button class="menu-button active" data-reading="one">今日の1枚</button>
        <button class="menu-button" data-reading="timeline">過去・現在・未来</button>
        <button class="menu-button" data-reading="yesno">Yes / No 占い</button>
        <button class="menu-button" data-reading="choice">二者択一占い</button>
        <button class="menu-button" data-reading="love">恋愛占い</button>
        <button class="menu-button" data-reading="work">仕事占い</button>
      </nav>

      <section class="panel form-panel" aria-live="polite">
        <div class="reading-form active" data-form="one">
          <h2>今日の1枚</h2>
          <label for="oneTheme">テーマ</label>
          <select id="oneTheme">
            <option value="総合運">総合運</option>
            <option value="恋愛運">恋愛運</option>
            <option value="仕事運">仕事運</option>
            <option value="金運">金運</option>
            <option value="人間関係">人間関係</option>
          </select>
          <button class="draw-button" id="drawOneButton">カードを1枚引く</button>
        </div>

        <div class="reading-form" data-form="timeline">
          <h2>過去・現在・未来</h2>
          <p>今の状況につながる流れと、これからの可能性を3枚で見ます。</p>
          <button class="draw-button" id="drawTimelineButton">3枚引く</button>
        </div>

        <div class="reading-form" data-form="yesno">
          <h2>Yes / No 占い</h2>
          <label for="yesNoQuestion">質問</label>
          <input id="yesNoQuestion" type="text" placeholder="例：この計画を進めるべき？" />
          <button class="draw-button" id="drawYesNoButton">答えを聞く</button>
        </div>

        <div class="reading-form" data-form="choice">
          <h2>二者択一占い</h2>
          <label for="choiceA">選択肢A</label>
          <input id="choiceA" type="text" placeholder="例：今の道を続ける" />
          <label for="choiceB">選択肢B</label>
          <input id="choiceB" type="text" placeholder="例：新しい挑戦をする" />
          <button class="draw-button" id="drawChoiceButton">A/Bを占う</button>
        </div>

        <div class="reading-form" data-form="love">
          <h2>恋愛占い</h2>
          <p>自分の気持ち、相手の気持ち、これからの流れを読みます。</p>
          <button class="draw-button" id="drawLoveButton">恋愛を占う</button>
        </div>

        <div class="reading-form" data-form="work">
          <h2>仕事占い</h2>
          <p>現状、課題、アドバイスを3枚で整理します。</p>
          <button class="draw-button" id="drawWorkButton">仕事を占う</button>
        </div>
      </section>

      <section id="result" class="panel result-panel empty">
        <p>占い方式を選んで、カードを引いてください。</p>
      </section>

      <section class="panel history-panel">
        <div class="history-title-row">
          <h2>占い履歴</h2>
          <button class="ghost-button" id="clearHistoryButton">履歴を消す</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
